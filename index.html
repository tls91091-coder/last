<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moonlight Website</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section id="home">
  <h2>Home</h2>
  <p>Welcome to my moon-themed website project.</p>
</section>

<section id="about">
  <h2>About</h2>
  <p>This website showcases a night sky theme with animations and interactivity.</p>
</section>

<section id="gallery">
  <h2>Gallery</h2>
  <img src="https://via.placeholder.com/300" alt="Moon image 1">
  <img src="https://via.placeholder.com/300" alt="Moon image 2">
</section>

<section id="video">
  <h2>Video</h2>
  <iframe width="560" height="315"
    src="https://www.youtube.com/embed/tgbNymZ7vqY"
    allowfullscreen>
  </iframe>
</section>

<section id="contact">
  <h2>Contact</h2>
  <form id="form">
    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Email" required>

    <button type="submit">Submit</button>
    <p id="error"></p>
  </form>
</section>

<footer>
  <p>© 2026 Moonlight Website</p>
</footer>

</body>
</html>
